# NASe configuration — single source of truth.
# After editing, run: sudo ./apply.sh

nas:
  hostname: nase

# --------------------------------------------------------------------------
# Drives
# --------------------------------------------------------------------------
# active:         false to skip this drive entirely (no mount, no spindown,
#                 no SMART check).  Useful for pre-configuring a drive before
#                 it is physically attached.  Defaults to true when omitted.
# read_only:      mount the drive read-only. Enforced at the kernel level —
#                 no user or application can write to it.  Sync jobs
#                 automatically remount rw for the duration of the sync.
# role:           "main" or "backup"
# owner:          user that should own the mountpoint directory.  apply.sh sets
#                 ownership of the mountpoint itself (instant).  To recursively
#                 fix ownership of all existing files run: sudo ./fix-ownership.sh
# spindown_min:   minutes of inactivity before the drive spins down (0 = never)
# smart_check:    enable periodic SMART health monitoring
# --------------------------------------------------------------------------
drives:
  - name: primary
    active: true
    uuid: "532b7925-0236-4dd4-8454-56050eb510d2"
    label: "NAS_PRIMARY"
    mountpoint: /mnt/primary
    role: main
    filesystem: ext4
    spindown_min: 60
    smart_check: true
    owner: nase

  - name: backup1
    active: true
    uuid: "044b7611-ec84-48e3-9ded-bf6a76876d01"
    label: "NAS_BACKUP_1"
    mountpoint: /mnt/backup1
    role: backup
    filesystem: ext4
    spindown_min: 60
    smart_check: true
    read_only: true

  - name: backup2
    active: true
    uuid: "135c94c8-d188-442a-a8b4-97061c11ac62"
    label: "NAS_BACKUP_2"
    mountpoint: /mnt/backup2
    role: backup
    filesystem: ext4
    spindown_min: 60
    smart_check: true
    read_only: true

# --------------------------------------------------------------------------
# Samba
# --------------------------------------------------------------------------
samba:
  workgroup: WORKGROUP
  # Samba users — passwords are read from .env: SAMBA_PASSWORD_<NAME_UPPERCASED>
  users:
    - nase
  shares:
    - name: Music
      path: /mnt/primary/Music
      read_only: false
      valid_users: "nase"
    - name: omv2
      path: /mnt/primary/omv2
      read_only: false
      valid_users: "nase"
    - name: Photo_albums
      path: /mnt/primary/Photo_albums
      read_only: false
      valid_users: "nase"
    - name: test
      path: /mnt/primary/test
      read_only: false
      valid_users: "nase"
    - name: videos
      path: /mnt/primary/videos
      read_only: false
      valid_users: "nase"
    - name: Backup1
      path: /mnt/backup1
      read_only: true
      valid_users: "nase"
    - name: Trash1
      path: /mnt/backup1/.trash
      read_only: true
      valid_users: "nase"
    - name: Backup2
      path: /mnt/backup2
      read_only: true
      valid_users: "nase"
    - name: Trash2
      path: /mnt/backup2/.trash
      read_only: true
      valid_users: "nase"

# --------------------------------------------------------------------------
# Tailscale
# --------------------------------------------------------------------------
tailscale:
  enabled: true
  # Auth key is read from .env: TAILSCALE_AUTHKEY
  # Set to true to route all client traffic through this node
  advertise_exit_node: false
  # Advertise LAN subnet to other Tailscale nodes (e.g. "192.168.1.0/24")
  # Leave empty to disable subnet routing
  advertise_routes: ""

# --------------------------------------------------------------------------
# Sync jobs
# --------------------------------------------------------------------------
# schedule uses systemd OnCalendar format:
#   "*-*-* 03:00:00"      → daily at 03:00
#   "*-*-* *:00/30:00"    → every 30 minutes
#   "Mon *-*-* 02:00:00"  → every Monday at 02:00
# See: systemd.time(7) or run: systemd-analyze calendar "<expression>"
#
# rsync_flags:     passed verbatim to rsync
# on_failure:      "notify" | "ignore"
# force_sync_days: run a full sync even when no changes are detected, if this
#                  many days have passed since the last successful sync.
#                  Guards against the change-detection mechanism being wrong.
#                  Default: 7. Set to 0 to disable.
# --------------------------------------------------------------------------
sync_jobs:
  - name: music-backup1
    source: /mnt/primary/Music/
    dest: /mnt/backup1/Music/
    schedule: "*-*-* *:00/01:00"
    rsync_flags: "--archive --delete --checksum"
    on_failure: notify
    force_sync_days: 7
    trash:
      enabled: true
      path: /mnt/backup1/.trash
      retention_days: 30

  - name: omv2-backup1
    source: /mnt/primary/omv2/
    dest: /mnt/backup1/omv2/
    schedule: "*-*-* *:00/01:00"
    rsync_flags: "--archive --delete"
    on_failure: notify
    force_sync_days: 7
    trash:
      enabled: true
      path: /mnt/backup1/.trash
      retention_days: 30

  - name: photos-backup1
    source: /mnt/primary/Photo_albums/
    dest: /mnt/backup1/Photo_albums/
    schedule: "*-*-* *:00/01:00"
    rsync_flags: "--archive --delete"
    on_failure: notify
    force_sync_days: 7
    trash:
      enabled: true
      path: /mnt/backup1/.trash
      retention_days: 30

  - name: test-backup1
    source: /mnt/primary/test/
    dest: /mnt/backup1/test/
    schedule: "*-*-* *:00/01:00"
    rsync_flags: "--archive --delete"
    on_failure: notify
    force_sync_days: 7
    trash:
      enabled: true
      path: /mnt/backup1/.trash
      retention_days: 30

  - name: videos-backup1
    source: /mnt/primary/videos/
    dest: /mnt/backup1/videos/
    schedule: "*-*-* *:00/01:00"
    rsync_flags: "--archive --delete"
    on_failure: notify
    force_sync_days: 7
    trash:
      enabled: true
      path: /mnt/backup1/.trash
      retention_days: 30

  - name: music-backup2
    source: /mnt/primary/Music/
    dest: /mnt/backup2/Music/
    schedule: "*-*-* *:00/02:00"
    rsync_flags: "--archive --delete --checksum"
    on_failure: notify
    force_sync_days: 7
    trash:
      enabled: true
      path: /mnt/backup2/.trash
      retention_days: 30

  - name: omv2-backup2
    source: /mnt/primary/omv2/
    dest: /mnt/backup2/omv2/
    schedule: "*-*-* *:00/02:00"
    rsync_flags: "--archive --delete"
    on_failure: notify
    force_sync_days: 7
    trash:
      enabled: true
      path: /mnt/backup2/.trash
      retention_days: 30

  - name: photos-backup2
    source: /mnt/primary/Photo_albums/
    dest: /mnt/backup2/Photo_albums/
    schedule: "*-*-* *:00/02:00"
    rsync_flags: "--archive --delete"
    on_failure: notify
    force_sync_days: 7
    trash:
      enabled: true
      path: /mnt/backup2/.trash
      retention_days: 30

  - name: test-backup2
    source: /mnt/primary/test/
    dest: /mnt/backup2/test/
    schedule: "*-*-* *:00/02:00"
    rsync_flags: "--archive --delete"
    on_failure: notify
    force_sync_days: 7
    trash:
      enabled: true
      path: /mnt/backup2/.trash
      retention_days: 30

  - name: videos-backup2
    source: /mnt/primary/videos/
    dest: /mnt/backup2/videos/
    schedule: "*-*-* *:00/02:00"
    rsync_flags: "--archive --delete"
    on_failure: notify
    force_sync_days: 7
    trash:
      enabled: true
      path: /mnt/backup2/.trash
      retention_days: 30

# --------------------------------------------------------------------------
# Additional services
# --------------------------------------------------------------------------
services:
  web:
    enabled: true
    # Port for the NASe web dashboard (status + logs)
    port: 8088

  filebrowser:
    enabled: true
    # Port the web UI listens on (access via http://<hostname>:<port>)
    port: 8080
    # Virtual root exposed by the file browser.  apply.sh populates this
    # directory with bind mounts so the view mirrors the Samba/Finder layout:
    # primary-drive shares appear at the top level; the backup drive and trash
    # appear as "Backup" and "Trash" virtual folders (names get a "_NAS" suffix
    # if a primary-drive share already uses those names).
    # Do not set this to /mnt — that would expose the raw primary/backup level.
    root: /srv/filebrowser
    # Login username (password set via FILEBROWSER_PASSWORD in .env)
    username: nase
    # Base URL path if served behind a reverse proxy (e.g. "/files").
    # Leave empty for direct access.
    base_url: ""

# --------------------------------------------------------------------------
# Notifications
# --------------------------------------------------------------------------
# method: "email" | "webhook" | "none"
notifications:
  method: email
  email: thomas.vettorel+NASe@gmail.com
