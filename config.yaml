# NASe configuration — single source of truth.
# After editing, run: sudo ./apply.sh

nas:
  hostname: nase

# --------------------------------------------------------------------------
# Drives
# --------------------------------------------------------------------------
# active:         false to skip this drive entirely (no mount, no spindown,
#                 no SMART check).  Useful for pre-configuring a drive before
#                 it is physically attached.  Defaults to true when omitted.
# role:           "main" or "backup"
# owner:          user that should own the mountpoint directory.  apply.sh sets
#                 ownership of the mountpoint itself (instant).  To recursively
#                 fix ownership of all existing files run: sudo ./fix-ownership.sh
# spindown_min:   minutes of inactivity before the drive spins down (0 = never)
# smart_check:    enable periodic SMART health monitoring
# --------------------------------------------------------------------------
drives:
  - name: primary
    active: true
    uuid: "532b7925-0236-4dd4-8454-56050eb510d2"
    label: "NAS_PRIMARY"
    mountpoint: /mnt/primary
    role: main
    filesystem: ext4
    spindown_min: 60
    smart_check: true
    owner: nase

  - name: backup
    active: true
    uuid: "044b7611-ec84-48e3-9ded-bf6a76876d01"
    label: "NAS_BACKUP"
    mountpoint: /mnt/backup
    role: backup
    filesystem: ext4
    spindown_min: 60
    smart_check: true
    owner: root

# --------------------------------------------------------------------------
# Samba
# --------------------------------------------------------------------------
samba:
  workgroup: WORKGROUP
  # Samba users — passwords are read from .env: SAMBA_PASSWORD_<NAME_UPPERCASED>
  users:
    - nase
  shares:
    - name: Music
      path: /mnt/primary/Music
      read_only: false
      valid_users: "nase"
    - name: omv2
      path: /mnt/primary/omv2
      read_only: false
      valid_users: "nase"
    - name: Photo_albums
      path: /mnt/primary/Photo_albums
      read_only: false
      valid_users: "nase"
    - name: test
      path: /mnt/primary/test
      read_only: false
      valid_users: "nase"
    - name: videos
      path: /mnt/primary/videos
      read_only: false
      valid_users: "nase"
    - name: Backup
      path: /mnt/backup
      read_only: true
      valid_users: "nase"
    - name: Trash
      path: /mnt/backup/.trash
      read_only: true
      valid_users: "nase"

# --------------------------------------------------------------------------
# Tailscale
# --------------------------------------------------------------------------
tailscale:
  enabled: true
  # Auth key is read from .env: TAILSCALE_AUTHKEY
  # Set to true to route all client traffic through this node
  advertise_exit_node: false
  # Advertise LAN subnet to other Tailscale nodes (e.g. "192.168.1.0/24")
  # Leave empty to disable subnet routing
  advertise_routes: ""

# --------------------------------------------------------------------------
# Sync jobs
# --------------------------------------------------------------------------
# schedule uses systemd OnCalendar format:
#   "*-*-* 03:00:00"      → daily at 03:00
#   "*-*-* *:00/30:00"    → every 30 minutes
#   "Mon *-*-* 02:00:00"  → every Monday at 02:00
# See: systemd.time(7) or run: systemd-analyze calendar "<expression>"
#
# rsync_flags: passed verbatim to rsync
# on_failure:  "notify" | "ignore"
# --------------------------------------------------------------------------
sync_jobs:
  - name: music-backup
    source: /mnt/primary/Music
    dest: /mnt/backup/Music/
    schedule: "*-*-* *:00/02:00"
    rsync_flags: "--archive --delete --checksum"
    on_failure: notify
    trash:
      enabled: true
      path: /mnt/backup/.trash/music-backup
      retention_days: 30

  - name: omv2-backup
    source: /mnt/primary/omv2/
    dest: /mnt/backup/omv2/
    schedule: "*-*-* *:00/01:00"
    rsync_flags: "--archive --delete"
    on_failure: notify
    trash:
      enabled: true
      path: /mnt/backup/.trash/omv2-backup
      retention_days: 30

  - name: photos-backup
    source: /mnt/primary/Photo_albums/
    dest: /mnt/backup/Photo_albums/
    schedule: "*-*-* *:00/01:00"
    rsync_flags: "--archive --delete"
    on_failure: notify
    trash:
      enabled: true
      path: /mnt/backup/.trash/photos-backup
      retention_days: 30

  - name: test-backup
    source: /mnt/primary/test/
    dest: /mnt/backup/test/
    schedule: "*-*-* *:00/01:00"
    rsync_flags: "--archive --delete"
    on_failure: notify
    trash:
      enabled: true
      path: /mnt/backup/.trash/test-backup
      retention_days: 30

  - name: videos-backup
    source: /mnt/primary/videos/
    dest: /mnt/backup/videos/
    schedule: "*-*-* *:00/01:00"
    rsync_flags: "--archive --delete"
    on_failure: notify
    trash:
      enabled: true
      path: /mnt/backup/.trash/videos-backup
      retention_days: 30

# --------------------------------------------------------------------------
# Additional services
# --------------------------------------------------------------------------
services:
  filebrowser:
    enabled: true
    # Port the web UI listens on (access via http://<hostname>:<port>)
    port: 8080
    # Directory exposed as the root of the file browser
    root: /mnt
    # Login username (password set via FILEBROWSER_PASSWORD in .env)
    username: nase
    # Base URL path if served behind a reverse proxy (e.g. "/files").
    # Leave empty for direct access.
    base_url: ""

# --------------------------------------------------------------------------
# Notifications
# --------------------------------------------------------------------------
# method: "email" | "webhook" | "none"
notifications:
  method: email
  email: thomas.vettorel+NASe@example.com
