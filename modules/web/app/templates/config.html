{% extends "base.html" %}
{% block title %}Config{% endblock %}

{% block content %}

<div class="card">
  <div class="tab-bar">
    {% for key, label in sections %}
    <button class="tab-btn {% if key == active_tab %}active{% endif %}"
            data-tab="{{ key }}"
            onclick="switchTab('{{ key }}')">{{ label }}</button>
    {% endfor %}
  </div>

  {% for key, label in sections %}
  <div id="panel-{{ key }}" class="tab-panel {% if key == active_tab %}active{% endif %}">
    <form hx-post="/config/{{ key }}"
          hx-target="#save-result-{{ key }}"
          hx-swap="innerHTML">
      <div class="editor-wrap">
        <textarea class="yaml-editor" name="yaml_text" spellcheck="false">{{ section_yaml[key] }}</textarea>
      </div>
      <div class="editor-footer">
        <button type="submit" class="btn-save">Save {{ label }}</button>
        <span id="save-result-{{ key }}" class="save-result"></span>
      </div>
    </form>
  </div>
  {% endfor %}
</div>

{% endblock %}

{% block scripts %}
<script>
  function switchTab(key) {
    document.querySelectorAll(".tab-panel").forEach(function(p) { p.classList.remove("active"); });
    document.querySelectorAll(".tab-btn").forEach(function(b) { b.classList.remove("active"); });
    document.getElementById("panel-" + key).classList.add("active");
    document.querySelector('[data-tab="' + key + '"]').classList.add("active");
  }
</script>
{% endblock %}
